{% extends "base.html" %}

{% block title %}{{ rifa.nombre }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-10 px-4">

  <h1 class="text-3xl font-bold text-center text-gray-800 mb-1">{{ rifa.nombre }}</h1>
  <p class="text-center text-gray-500 mb-6">Boleto: {{ rifa.precio_boleto | pesos }}</p>

  <div class="flex justify-center gap-6 text-sm text-gray-500 mb-8">
    <span class="flex items-center gap-1.5">
      <span class="w-4 h-4 rounded border-2 border-green-500 bg-green-50 inline-block"></span> Disponible
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-4 h-4 rounded border-2 border-yellow-500 bg-yellow-50 inline-block"></span> Reservado
    </span>
    <span class="flex items-center gap-1.5">
      <span class="w-4 h-4 rounded border-2 border-red-400 bg-red-100 inline-block"></span> Pagado
    </span>
  </div>

  {% include "partials/grilla.html" %}

  <p class="text-center text-xs text-gray-400 mt-8">La grilla se actualiza cada 3 segundos.</p>
</div>
{% endblock %}
