<div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4"
     onclick="if(event.target===this) document.getElementById('modal').innerHTML=''">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm">
    <h2 class="text-xl font-bold mb-1">Reservar boleto</h2>
    <p class="text-gray-400 text-sm mb-5">N°{{ "%03d" | format(boleto.numero.valor) }}</p>

    <form hx-post="/boletos/{{ boleto.numero.valor }}/reservar"
          hx-target="#modal"
          hx-swap="innerHTML">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">Tu nombre</label>
        <input type="text" name="nombre" required autofocus
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="Ej: Ana Torres">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">Tu WhatsApp</label>
        <input type="tel" name="telefono" required
               class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
               placeholder="+56912345678">
      </div>
      <div class="flex gap-3">
        <button type="submit"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg py-2 transition-colors">
          Reservar
        </button>
        <button type="button"
                onclick="document.getElementById('modal').innerHTML=''"
                class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 transition-colors">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
