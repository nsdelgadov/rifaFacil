<div id="config-campaign" class="bg-white rounded-xl border border-gray-200 p-4 mb-4">
  <h2 class="text-sm font-semibold text-gray-700 mb-3">Campaña e imágenes</h2>

  <form hx-post="/admin/config/campaign" hx-target="#config-campaign" hx-swap="outerHTML" class="flex gap-2 mb-4">
    <input type="url" name="link" value="{{ campaign_link }}"
           placeholder="https://instagram.com/tu-campaña"
           class="flex-1 text-sm border border-gray-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-300">
    <button type="submit" class="text-sm bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">
      Guardar link
    </button>
  </form>

  <p class="text-xs text-gray-500 mb-2">Imágenes (máx. 10, 2 MB c/u). La marcada con ★ es la principal.</p>

  {% include "admin/partials/galeria_imagenes.html" %}
</div>
