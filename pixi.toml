[project]
name = "rifafacil"
version = "0.1.0"
description = "Sistema de rifas - aprendiendo Python DDD"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = "3.12.*"
pydantic = ">=2.0,<3"
openpyxl = ">=3.1"
pytest = ">=8.0"
pytest-cov = ">=5.0"
hatchling = "*"

[pypi-dependencies]
rifafacil = { path = ".", editable = true }
import-linter = ">=2.0"
mutmut = ">=2.0"

[tasks]
test = "pytest"
lint-imports = "lint-imports"
muttest = "mutmut run"
cov = "pytest --cov=rifafacil --cov-report=term-missing"
