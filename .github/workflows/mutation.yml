name: Mutation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mutation:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Correr mutation testing sobre el dominio
        run: |
          set -o pipefail
          mutmut run --paths-to-mutate src/rifafacil/domain 2>&1 | tail -3
        continue-on-error: true

      - name: Mostrar resultados
        if: always()
        run: |
          mutmut results
          echo ""
          echo "=== Detalle de cada mutante vivo ==="
          mutmut results 2>/dev/null | grep -oE '[0-9]+-[0-9]+|[0-9]+' | while IFS= read -r range; do
            if [[ "$range" =~ ^([0-9]+)-([0-9]+)$ ]]; then
              for i in $(seq "${BASH_REMATCH[1]}" "${BASH_REMATCH[2]}"); do
                echo "--- Mutante $i ---"
                mutmut show "$i" 2>/dev/null || true
              done
            elif [[ "$range" =~ ^[0-9]+$ ]]; then
              echo "--- Mutante $range ---"
              mutmut show "$range" 2>/dev/null || true
            fi
          done
